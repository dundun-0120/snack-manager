<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>家庭零食管理系统</title>
</head>
<body>
  <script>
    // 在页面渲染之前同步设置主题，避免闪烁
    (function() {
      try {
        var s = localStorage.getItem('sm_settings');
        var settings = s ? JSON.parse(s) : [];
        var theme = 'professional';
        for (var i = 0; i < settings.length; i++) {
          if (settings[i].key === 'theme') { theme = settings[i].value; break; }
        }
        document.body.className = 'theme-' + theme;
      } catch(e) {
        document.body.className = 'theme-professional';
      }
    })();
  </script>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
